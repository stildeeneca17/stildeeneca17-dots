# ╔══════════════════════════════════════════════╗
# ║        stildeeneca17 — Tmux Config           ║
# ╚══════════════════════════════════════════════╝

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g renumber-windows on
set -g focus-events on
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Window / Pane navigation ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-tmux-navigator (requires plugin)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# --- Status bar ---
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#06080f,fg=#f3f6f9"
set -g status-left "#[fg=#ffe066,bold] #S #[fg=#8a8fa3]| "
set -g status-right "#[fg=#7fb4ca] %H:%M #[fg=#8a8fa3]| #[fg=#b7cc85]#h"
setw -g window-status-format "#[fg=#8a8fa3] #I:#W "
setw -g window-status-current-format "#[fg=#ffe066,bold] #I:#W "

# --- Pane borders ---
set -g pane-border-style "fg=#263356"
set -g pane-active-border-style "fg=#7fb4ca"

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
