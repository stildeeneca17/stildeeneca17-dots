# ╔══════════════════════════════════════════════╗
# ║        stildeeneca17 — Tmux Config           ║
# ╚══════════════════════════════════════════════╝

# --- General ---
set -g mouse on
set -g status-position top
set -g history-limit 10000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Vi mode ---
set -g mode-keys vi
setw -g mode-keys vi
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Status bar ---
set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#06080f,fg=#f3f6f9"
set -g status-left "#[fg=#ffe066,bold] #S #[fg=#8a8fa3]| "
set -g status-right "#[fg=#7fb4ca] %H:%M #[fg=#8a8fa3]| #[fg=#b7cc85]#h"
setw -g window-status-format "#[fg=#8a8fa3] #I:#W "
setw -g window-status-current-format "#[fg=#ffe066,bold] #I:#W "

# --- Pane borders ---
set -g pane-border-style "fg=#263356"
set -g pane-active-border-style "fg=#7fb4ca"

# --- TPM Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
