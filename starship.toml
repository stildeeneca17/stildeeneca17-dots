"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
$git_branch\
$git_status\
$git_commit\
$nodejs\
$python\
$deno\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold #7fb4ca"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold #ff8dd7"
format = "on [$symbol$branch]($style) "

[git_status]
style = "#cb7c94"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_commit]
commit_hash_length = 7
style = "#8a8fa3"
format = "[$hash$tag]($style) "
tag_symbol = " 🏷 "

[nodejs]
symbol = " "
style = "#b7cc85"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "#ffe066"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[deno]
symbol = "🦕 "
style = "#7aa89f"
format = "[$symbol($version )]($style)"

[kubernetes]
symbol = "⎈ "
style = "bold #7fb4ca"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

[docker_context]
symbol = " "
style = "#7fb4ca"
format = "[$symbol$context]($style) "
only_with_files = true
disabled = false

[cmd_duration]
min_time = 2_000
format = "⏱ [$duration]($style) "
style = "#ffe066"

[character]
success_symbol = "[❯](bold #b7cc85)"
error_symbol = "[❯](bold #cb7c94)"
vimcmd_symbol = "[❮](bold #ffe066)"

[line_break]
disabled = false

[time]
disabled = true
